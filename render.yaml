databases:
  - name: realcore-db
    region: frankfurt
    plan: basic-256mb
    databaseName: realcore_shop
    user: realcore

services:
  - type: web
    name: realcore-employee-shop
    runtime: node
    region: frankfurt
    plan: starter
    numInstances: 1
    buildCommand: |
      pnpm install --no-frozen-lockfile --strict-peer-dependencies=false
      pnpm exec prisma generate
      pnpm exec prisma db push --force-reset --accept-data-loss
      pnpm exec prisma db seed
      pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: realcore-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: realcore2025
      - key: SUPPLIER_PASSWORD
        value: supplier2025
      - key: SEED_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_BASE_URL
        value: https://mitarbeitershop.realcore.de
    healthCheckPath: /
    autoDeploy: true

  # Cron Job für automatischen Jahres-Reset am 1. Januar
  - type: cron
    name: yearly-quota-reset
    runtime: node
    region: frankfurt
    schedule: "0 0 1 1 *"
    buildCommand: echo "Cron job ready"
    startCommand: |
      curl -X POST \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json" \
        "$NEXT_PUBLIC_BASE_URL/api/cron/yearly-reset"
    envVars:
      - key: CRON_SECRET
        fromService:
          name: realcore-employee-shop
          type: web
          envVarKey: CRON_SECRET
      - key: NEXT_PUBLIC_BASE_URL
        fromService:
          name: realcore-employee-shop
          type: web
          envVarKey: NEXT_PUBLIC_BASE_URL

  # Cron Job für tägliche Bestandsprüfung (09:00 Uhr)
  - type: cron
    name: daily-stock-check
    runtime: node
    region: frankfurt
    schedule: "0 9 * * *"
    buildCommand: echo "Stock check cron ready"
    startCommand: |
      curl -X POST \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json" \
        "$NEXT_PUBLIC_BASE_URL/api/cron/check-stock"
    envVars:
      - key: CRON_SECRET
        fromService:
          name: realcore-employee-shop
          type: web
          envVarKey: CRON_SECRET
      - key: NEXT_PUBLIC_BASE_URL
        fromService:
          name: realcore-employee-shop
          type: web
          envVarKey: NEXT_PUBLIC_BASE_URL
