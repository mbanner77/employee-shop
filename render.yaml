databases:
  - name: realcore-db
    region: frankfurt
    plan: free
    databaseName: realcore_shop
    user: realcore

services:
  - type: web
    name: realcore-employee-shop
    runtime: node
    region: frankfurt
    plan: free
    numInstances: 1
    buildCommand: pnpm install && pnpm exec prisma generate && pnpm exec prisma db push && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: realcore-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: realcore2025
      - key: SEED_SECRET
        generateValue: true
    healthCheckPath: /
    autoDeploy: true
